<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Divs Check</title>
	<link rel="script" href="main.js">
<style type="text/css">
	body{
		display: flex;
    justify-content: center; 
    align-items: center;
	}
	#one{
height: 400px;
width: 600px;

border: 2px solid black;
position: relative;

	}
	#blue{
		height: 200px;
		width: 600px;
		position: relative;
		background-color: darkblue;
		align-items: center;
		text-align: center;
		justify-content: center;
		color: white;
		margin-top: -17px;
	}
	#white{
		height: 200px;
		width: 600px;
		position: relative;
		background-color: ghostwhite;
	}
	#btn{
		height: 150px;
		width: 350px;
		position: absolute;
		background-color: whitesmoke;
		border: 1px solid blue;
		top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    padding-left: 5px;
    padding-top: 10px;
    display: grid;
  grid-template-columns: repeat(3, 1fr); 
  gap: 15px; 
  border-radius: 9px;
  overflow: hidden;       
    word-wrap: break-word;
    height: auto;         
    min-height: 150px;
	}

	P{

		padding-top: 12px;
	}
	.input{
		width: 50px;


	}
	#result{
		padding-left: 70px;
		font-size: 10px;
	}
	#convert:hover{
		transform: scale(1.1);
		cursor: pointer;
	}
</style>
</head>
<body>
	<script src="main.js"></script>
<div id="one">
	<div id="blue">
		<p>XYZ-COMPANY</p>
		<p>CURRANCY EXCHANGE PLATFORM</p>
	</div>
	<div id="white"></div>
	<div id="btn">
		<div>
		Amount        
		<br><input type="number" id="amount" class="input">
	</div>
	<div> From
		<br>
	<select id="from">
		<option value="USD">USD-$</option>
		<option value="RWF">RWF</option>
	</select></div>
	<div class="input">
		TO<br>
		<select id="to">
			<option value="USD">USD-$</option>
		<option value="RWF"> RWF</option>
		</select>
	</div>
	<div>
		<button id="convert" onclick="convert()">Convert</button>
	</div>
	<div id="result"><h2 id="resultText">Result:</h2></div>
	</div>
</div>
</body>
<script type="text/javascript">
function convert() {
    let money = document.getElementById("amount").value;
    let fromUnit = document.getElementById("from").value;
    let toUnit = document.getElementById("to").value;
    let resultDisplay = document.getElementById("resultText");

    let rate = 1300;
    let finalAnswer = 0;

    if (fromUnit == "USD" && toUnit == "RWF") {
        finalAnswer = money * rate;
    } else if (fromUnit == "RWF" && toUnit == "USD") {
        finalAnswer = money / rate;
    } else {
        finalAnswer = money;
    }

    resultDisplay.innerText = "Result: " + finalAnswer;
}
</script>
</html>
