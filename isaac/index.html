<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Translate</title>
    <style>
        #it {
            height: 300px;
            width: 400px;
            border: 2px solid rgb(242, 237, 237);
            border-radius: 9px;
            margin-top: 30px;
            background-color: rgb(113, 120, 203);
            box-shadow: 20px 20px 20px rgba(255, 255, 255, 0.2); /* Fixed shadow alpha */
            display: flex;
            flex-direction: column; /* Stacked text and select */
            align-items: center;
            justify-content: center;
            transition: transform 0.3s;
        }
        #it:hover {
            transform: scale(1.1);
        }
        body {
            display: flex;
            height: 100vh;
            margin: 0;
            align-items: center;
            justify-content: center;
            background-color: rgb(10, 0, 30);
        }
        h2 { color: white; font-family: sans-serif; }
    </style>
</head>
<body>
    <div id="it">
        <h2 data-key="title">WELCOME TO THE WORLD</h2>
        
        <select id="language" onchange="translateTo(this.value)">
            <option value="en">English</option>
            <option value="fr">French</option>
        </select>
    </div>

<script>
    const translations = {
        en: {
            title: "WELCOME TO THE WORLD",
        },
        fr: {
            title: "BIENVENUE DANS LE MONDE",
        }
    };

    function translateTo(lang) {
        // Find all elements with the 'data-key' attribute
        const elements = document.querySelectorAll('[data-key]');
        
        elements.forEach(el => {
            // Get the key (e.g., "title")
            const key = el.getAttribute('data-key');
            // Change the text using the dictionary
            el.innerText = translations[lang][key]; 
        });
    }
</script>
</body>
</html>
